# =============================================================================
# Docker Compose - InmuebleBot Services
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d app          # Start only app
#   docker compose down            # Stop all
#
# Streamlit UI: http://localhost:8501
# FastAPI: http://localhost:8000
# =============================================================================

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16
    container_name: inmueblebot-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inmueblebot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inmueblebot"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis para caché y sesiones
  redis:
    image: redis:7-alpine
    container_name: inmueblebot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

# Aplicación principal FastAPI
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inmueblebot-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/inmueblebot
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./imagenes:/app/imagenes
      - ./credentials:/app/credentials
    ports:
      - "8051:8000"
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Streamlit Chat UI
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inmueblebot-streamlit
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/inmueblebot
      - REDIS_URL=redis://redis:6379/0
      - STREAMLIT_SERVER_PORT=8501
      - BACKEND_URL=http://app:8000
      - API_URL=http://app:8000
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_started
    command: streamlit run frontend/chat_ui.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false

volumes:
  postgres_data:
  redis_data: