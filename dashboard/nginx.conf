# =============================================================================
# Nginx — Configuración del Dashboard
#
# Dos responsabilidades:
#   1. Servir el SPA (Single Page Application) de React
#   2. Hacer proxy de /api/* hacia el contenedor FastAPI
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── 1. Proxy de API ───────────────────────────────────────────────────────
    # Cualquier request que empiece con /api/ se redirige internamente
    # a http://app:8000/ (el servicio FastAPI en la red Docker interna).
    #
    # "app" no es localhost ni una IP: es el nombre del servicio en
    # docker-compose. Docker tiene un DNS interno que resuelve "app" →
    # IP del contenedor inmueblebot-app automáticamente.
    #
    # rewrite: /api/admin/leads → /admin/leads  (quita el prefijo /api)
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        # Cabeceras necesarias para que FastAPI reciba la request correctamente
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para endpoints lentos (ej: queries grandes)
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ── 2. SPA routing ───────────────────────────────────────────────────────
    # React maneja las rutas en el browser (client-side routing).
    # Si el usuario navega directamente a /clients o hace F5, Nginx
    # no tiene ese archivo. Sin esta regla daría 404.
    #
    # try_files: intenta servir el archivo literal → el directorio →
    # si no existe ninguno, devuelve index.html (React se encarga del resto).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 3. Cache de assets estáticos ─────────────────────────────────────────
    # Vite genera nombres con hash: main-Dh3kL9xZ.js
    # Como el hash cambia con cada build, podemos cachear agresivamente.
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Logs para debugging
    access_log /var/log/nginx/dashboard_access.log;
    error_log  /var/log/nginx/dashboard_error.log;
}
