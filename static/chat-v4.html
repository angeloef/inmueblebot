<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador WhatsApp — Bot v4</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111b21;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .phone {
    width: 390px;
    height: 780px;
    background: #0b141a;
    border-radius: 40px;
    border: 6px solid #222e35;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 32px 64px rgba(0,0,0,.6);
  }

  .header {
    background: #202c33;
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #00a884;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .header-info h2 { color: #e9edef; font-size: 15px; font-weight: 600; }
  .status { color: #8696a0; font-size: 12px; }
  .status.typing { color: #00a884; }

  .router-badge {
    margin-left: auto;
    background: #00a884;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 10px;
    letter-spacing: .5px;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: #0b141a;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23182229' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: #374045; border-radius: 4px; }

  .bubble-wrap {
    display: flex;
    flex-direction: column;
    max-width: 80%;
  }
  .bubble-wrap.user { align-self: flex-end; align-items: flex-end; }
  .bubble-wrap.bot  { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13.5px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble-wrap.user .bubble {
    background: #005c4b;
    color: #e9edef;
    border-bottom-right-radius: 2px;
  }
  .bubble-wrap.bot .bubble {
    background: #202c33;
    color: #e9edef;
    border-bottom-left-radius: 2px;
  }

  .meta {
    font-size: 10px;
    color: #8696a0;
    margin-top: 2px;
    padding: 0 4px;
  }
  .meta .router { color: #00a884; font-weight: 600; }
  .meta .latency { margin-left: 6px; }

  .spinner {
    display: flex; gap: 4px; padding: 10px 14px;
    background: #202c33; border-radius: 8px; border-bottom-left-radius: 2px;
    align-self: flex-start;
  }
  .spinner span {
    width: 7px; height: 7px;
    background: #8696a0; border-radius: 50%;
    animation: bounce .9s ease-in-out infinite;
  }
  .spinner span:nth-child(2) { animation-delay: .15s; }
  .spinner span:nth-child(3) { animation-delay: .30s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  .input-bar {
    background: #202c33;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  textarea {
    flex: 1;
    background: #2a3942;
    border: none;
    border-radius: 20px;
    color: #e9edef;
    font-size: 14px;
    line-height: 1.4;
    padding: 9px 16px;
    resize: none;
    outline: none;
    max-height: 100px;
    min-height: 40px;
    font-family: inherit;
  }
  textarea::placeholder { color: #8696a0; }

  button.send {
    width: 44px; height: 44px;
    border: none;
    border-radius: 50%;
    background: #00a884;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background .15s;
  }
  button.send:hover { background: #02c197; }
  button.send:disabled { background: #374045; cursor: default; }

  .toolbar {
    background: #111b21;
    padding: 6px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  .toolbar label { color: #8696a0; font-size: 11px; }
  .toolbar select {
    background: #2a3942; border: none; color: #e9edef;
    font-size: 11px; padding: 3px 8px; border-radius: 6px; cursor: pointer;
  }
  .toolbar button.reset {
    margin-left: auto;
    background: #374045; border: none; color: #8696a0;
    font-size: 11px; padding: 4px 10px; border-radius: 6px; cursor: pointer;
  }
  .toolbar button.reset:hover { color: #e9edef; }

  .day-label {
    text-align: center;
    color: #8696a0;
    font-size: 11px;
    background: #182229;
    padding: 3px 12px;
    border-radius: 8px;
    align-self: center;
    margin: 6px 0;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h2>InmuebleBot</h2>
      <div class="status" id="status">en línea</div>
    </div>
    <div class="router-badge" id="routerBadge">v4</div>
  </div>

  <div class="toolbar">
    <label>Router:</label>
    <select id="routerSelect">
      <option value="v4" selected>v4 (Knowledge Agent)</option>
      <option value="v3">v3</option>
      <option value="v2">v2</option>
    </select>
    <label style="margin-left:8px">Teléfono:</label>
    <input id="phoneInput" value="sim-dev-001"
      style="background:#2a3942;border:none;color:#e9edef;font-size:11px;padding:3px 8px;border-radius:6px;width:110px">
    <button class="reset" onclick="resetChat()">🗑 Reset</button>
  </div>

  <div class="messages" id="messages">
    <div class="day-label">Hoy</div>
  </div>

  <div class="input-bar">
    <textarea id="input" placeholder="Escribe un mensaje..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API = '/simulate/multi';
let sessionPhone = document.getElementById('phoneInput').value;
let pending = false;

function ts() {
  return new Date().toLocaleTimeString('es', { hour:'2-digit', minute:'2-digit' });
}

function addMessage(text, role, meta = null) {
  const wrap = document.createElement('div');
  wrap.className = `bubble-wrap ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    m.innerHTML = `${ts()} · <span class="router">${meta.router || '?'}</span><span class="latency">${meta.latency ? (meta.latency/1000).toFixed(1)+'s' : ''}</span>`;
    wrap.appendChild(m);
  } else {
    const m = document.createElement('div');
    m.className = 'meta';
    m.textContent = ts();
    wrap.appendChild(m);
  }

  document.getElementById('messages').appendChild(wrap);
  scrollBottom();
  return wrap;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'bubble-wrap bot';
  wrap.id = 'typing';
  wrap.innerHTML = '<div class="spinner"><span></span><span></span><span></span></div>';
  document.getElementById('messages').appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function scrollBottom() {
  const m = document.getElementById('messages');
  m.scrollTop = m.scrollHeight;
}

function setStatus(text, isTyping) {
  const s = document.getElementById('status');
  s.textContent = text;
  s.className = 'status' + (isTyping ? ' typing' : '');
}

async function sendMessage() {
  if (pending) return;
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  autoResize(input);

  const router = document.getElementById('routerSelect').value;
  sessionPhone = document.getElementById('phoneInput').value || 'sim-dev-001';

  addMessage(msg, 'user');

  pending = true;
  document.getElementById('sendBtn').disabled = true;
  setStatus('escribiendo…', true);
  showTyping();

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, phone: sessionPhone, router, reset: false }),
    });

    const data = await res.json();
    hideTyping();

    if (!res.ok) {
      addMessage(`⚠️ Error ${res.status}: ${data.detail || JSON.stringify(data)}`, 'bot');
    } else {
      const text = data.response || data.response_text || '(sin respuesta)';
      addMessage(text, 'bot', {
        router: data.router || data.router_label,
        latency: data.latency_ms,
      });
    }
  } catch (err) {
    hideTyping();
    addMessage(`⚠️ ${err.message}`, 'bot');
  } finally {
    pending = false;
    document.getElementById('sendBtn').disabled = false;
    setStatus('en línea', false);
  }
}

function resetChat() {
  document.getElementById('messages').innerHTML = '<div class="day-label">Hoy</div>';
  // next message will be fresh session naturally (no server-side reset needed
  // unless you want clean memory — change reset:false to reset:true below if desired)
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

document.getElementById('routerSelect').addEventListener('change', function() {
  document.getElementById('routerBadge').textContent = this.value;
});
</script>
</body>
</html>
