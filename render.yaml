# =============================================================================
# Render Blueprint for InmuebleBot
# =============================================================================
# 
# Usage:
# 1. Go to Render Dashboard > Blueprints > New Blueprint
# 2. Connect your GitHub repository
# 3. This render.yaml will be detected automatically
# 4. Fill in the Environment Variables
# 5. Click "Apply Blueprint"
#
# =============================================================================

# List Render Postgres databases here
databases:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  - name: inmueblebot-db
    plan: basic-256mb
    postgresMajorVersion: "16"
    databaseName: inmueblebot
    user: inmbot

# List services (except databases) here
services:
  # =============================================================================
  # Redis Cache
  # =============================================================================
  - name: inmueblebot-redis
    type: keyvalue
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all connections
    plan: free
    maxmemoryPolicy: allkeys-lru

  # =============================================================================
  # FastAPI Backend (Main Service)
  # =============================================================================
  - name: inmueblebot-api
    type: web
    runtime: docker
    dockerfilePath: Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    buildFilter:
      paths:
        - .env
        - requirements.txt
        - app/
        - config/
        - alembic/
    envVars:
      # Application
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      
      # Database (auto-connected via internal URL)
      - key: DATABASE_URL
        fromDatabase:
          name: inmueblebot-db
          property: connectionString
      
      # Redis (auto-connected via internal URL)
      - key: REDIS_URL
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
      
      # LLM Configuration
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      
      # WhatsApp / Meta Configuration
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_WEBHOOK_VERIFY_TOKEN
        sync: false
        generateValue: true
      
      # Security
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        sync: false
      
    # Health check
    healthCheckPath: /health
    healthCheckMethod: GET
    # Initial delay before first health check
    startupDelaySeconds: 30
    
    # Auto-deploy on push to main
    autoDeployTrigger: commit
    
    # Instance settings
    plan: free
    
    # Ports
    ports:
      - 8000

  # =============================================================================
  # Celery Worker (Background Tasks)
  # =============================================================================
  - name: inmueblebot-celery
    type: worker
    runtime: docker
    dockerfilePath: Dockerfile
    dockerCommand: celery -A celery_app worker --loglevel=info
    buildFilter:
      paths:
        - .env
        - requirements.txt
        - app/
        - celery_app.py
    envVars:
      - key: ENVIRONMENT
        value: production
      
      - key: DATABASE_URL
        fromDatabase:
          name: inmueblebot-db
          property: connectionString
      
      - key: REDIS_URL
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
      
      - key: CELERY_BROKER_URL
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
    
    autoDeployTrigger: commit
    plan: free

  # =============================================================================
  # Celery Beat (Task Scheduler)
  # =============================================================================
  - name: inmueblebot-beat
    type: worker
    runtime: docker
    dockerfilePath: Dockerfile
    dockerCommand: celery -A celery_app beat --loglevel=info
    buildFilter:
      paths:
        - .env
        - requirements.txt
        - app/
        - celery_app.py
    envVars:
      - key: ENVIRONMENT
        value: production
      
      - key: DATABASE_URL
        fromDatabase:
          name: inmueblebot-db
          property: connectionString
      
      - key: REDIS_URL
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
      
      - key: CELERY_BROKER_URL
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: inmueblebot-redis
          type: keyvalue
          property: connectionString
    
    autoDeployTrigger: commit
    plan: free

  # =============================================================================
  # Streamlit UI (Optional - for testing)
  # =============================================================================
