version: 1

# ==================== DATABASES ====================
databases:
  - name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: frankfurt

# ==================== REDIS ====================
services:
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: frankfurt

# ==================== FASTAPI BACKEND ====================
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inmueblebot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: inmueblebot-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production

# ==================== CELERY WORKER ====================
  - type: worker
    name: inmueblebot-celery-worker
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: frankfurt
    startCommand: celery -A app.celery_app worker --loglevel=info

# ==================== CELERY BEAT ====================
  - type: worker
    name: inmueblebot-celery-beat
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: frankfurt
    startCommand: celery -A app.celery_app beat --loglevel=info