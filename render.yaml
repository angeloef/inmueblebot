version: 1

# ==================== DATABASES ====================
# ⚠️ Phase 0a — DRIFT A RESOLVER (manual): este blueprint declara una DB administrada
# 'inmueblebot' (databaseName), pero la app se conecta vía DATABASE_URL a una DB EXTERNA
# distinta ('inmueblebot_rfv1' en dpg-d7vet8tckfvc73ehnjk0-a). O sea: este bloque
# `databases:` está huérfano (no es la DB que usa la app). Decidí cuál es la canónica y
# alineá ambas, o eliminá el bloque si la DB real se gestiona fuera del blueprint.
databases:
  - name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: oregon

# ==================== SERVICES ====================
services:
  # Redis (Render auto-inyecta REDIS_URL como env var)
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

  # FastAPI Backend
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    # Phase 0a: Alembic es la única autoridad de DDL. Esto corre UNA vez antes de
    # promover el nuevo deploy (no por-boot). Con 0 migraciones es un no-op seguro;
    # cuando exista el baseline, lo aplica. Si falla, Render aborta el deploy (rollback
    # automático al release anterior) — exactamente lo que queremos para una migración rota.
    preDeployCommand: alembic upgrade head

    envVars:
      # ⚠️ Phase 0a: el valor (con credencial ROTADA) vive SOLO en Render Secrets.
      # sync:false ⇒ Render NO lo sobrescribe desde el blueprint. Cargalo a mano en el
      # dashboard del servicio. NUNCA volver a comitear la URL con password al repo.
      - key: DATABASE_URL
        sync: false
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      # REDIS_URL es auto-inyectado por Render desde el servicio Redis definido arriba
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      # Google Places (New) — autocompletado de ciudad en el dashboard. Solo server-side.
      # sync:false ⇒ el valor se pega a mano en el dashboard de Render (placeholder).
      - key: GOOGLE_PLACES_API_KEY
        sync: false
