version: 1

# ==================== DATABASES ====================
databases:
  - name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: oregon

# ==================== SERVICES ====================
services:
  # Redis
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all for development

  # FastAPI Backend
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        # ?? PENDIENTE: Reemplazar con Internal Connection String de la nueva DB en Oregon
        # Crear nueva DB en https://dashboard.render.com/databases → New PostgreSQL
        # Region: Oregon. Luego poner acá la "Internal Database URL" (sin +asyncpg, lo agrega config.py)
        value: "PENDING_REPLACE_WITH_OREGON_DB_URL"
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      - key: REDIS_URL
        # ?? PENDIENTE: Reemplazar con Internal Connection String del nuevo Redis en Oregon
        # Crear nuevo Redis en https://dashboard.render.com/redis → New Redis
        # Region: Oregon. Usar la \"Internal Connection String\" (rediss://...)
        value: "PENDING_REPLACE_WITH_OREGON_REDIS_URL"
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
