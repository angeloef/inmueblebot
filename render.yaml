version: 1

# ==================== PostgreSQL Database ====================
  - type: postgres
    name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: frankfurt

# ==================== Redis ====================
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: frankfurt

# ==================== FastAPI Backend ====================
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: frankfurt
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inmueblebot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: inmueblebot-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production

# ==================== Celery Worker ====================
  - type: worker
    name: inmueblebot-celery-worker
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: frankfurt
    startCommand: celery -A app.celery_app worker --loglevel=info

# ==================== Celery Beat ====================
  - type: worker
    name: inmueblebot-celery-beat
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: frankfurt
    startCommand: celery -A app.celery_app beat --loglevel=info