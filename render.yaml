version: 1

# ==================== DATABASES ====================
databases:
  - name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: oregon

# ==================== SERVICES ====================
services:
  # Redis
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all for development

  # FastAPI Backend
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inmueblebot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: inmueblebot-redis
          type: redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"

  # Celery Worker
  - type: worker
    name: inmueblebot-celery-worker
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon

  # Celery Beat
  - type: worker
    name: inmueblebot-celery-beat
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon