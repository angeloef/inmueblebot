version: 1

# ==================== DATABASES ====================
databases:
  - name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: oregon

# ==================== SERVICES ====================
services:
  # Redis (Render auto-inyecta REDIS_URL como env var)
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all

  # FastAPI Backend
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        value: "postgresql://inmueblebot_user:XSqFG4FiC0q5OXXn1CiND25aHX076isu@dpg-d7vet8tckfvc73ehnjk0-a.oregon-postgres.render.com/inmueblebot_rfv1?ssl=require"
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"
      # REDIS_URL es auto-inyectado por Render desde el servicio Redis definido arriba
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
