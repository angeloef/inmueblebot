version: 1

# ==================== DATABASES ====================
databases:
  - name: inmueblebot-db
    plan: free
    databaseName: inmueblebot
    region: oregon

# ==================== SERVICES ====================
services:
  # Redis
  - type: redis
    name: inmueblebot-redis
    plan: free
    region: oregon
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all for development

  # FastAPI Backend
  - type: web
    name: inmueblebot-api
    env: docker
    plan: free
    dockerfilePath: Dockerfile
    region: oregon
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: DATABASE_URL
        value: "postgresql+asyncpg://inmueblebot_user:saL1PlnMCey0qrxY0fd0LDmjqRl5BDeY@dpg-d7sj1jt0lvsc73cnvsrg-a:5432/inmueblebot"
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: "8000"

